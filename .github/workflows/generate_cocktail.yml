name: Generate Cocktail Star Glass

on:
  schedule:
    # Runs every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual execution

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push generated images back to the repository
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate Cocktail and Cat SVGs
        run: node scripts/generate_cocktail.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/cocktail.svg assets/cat_bartender.svg README.md
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update cocktail and bartender SVGs" && git push origin main)
