<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#1a1c23" rx="15" />

  <!-- ネオンの飾り月 -->
  <path d="M 280 80 A 60 60 0 1 0 340 140 A 45 45 0 1 1 280 80 Z" fill="none" stroke="#ffb86c" stroke-width="4" filter="url(#neon-glow)" opacity="0.8" />

  <!-- カクテルの液体 -->
  <polygon points="132.4,156.0 267.6,156.0 210,220 190,220" fill="#00f2fe" opacity="0.8" />

  <!-- カクテルの泡（ゆらゆら昇るアニメーション） -->
  <g opacity="0.6">
    <circle cx="180" cy="200" r="3" fill="#ffffff">
      <animate attributeName="cy" from="215" to="156.0" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" from="1" to="0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="210" cy="180" r="2" fill="#ffffff">
      <animate attributeName="cy" from="215" to="156.0" dur="2.5s" repeatCount="indefinite" begin="0.8s" />
      <animate attributeName="opacity" from="1" to="0" dur="2.5s" repeatCount="indefinite" begin="0.8s" />
    </circle>
    <circle cx="195" cy="160" r="2.5" fill="#ffffff">
      <animate attributeName="cy" from="215" to="156.0" dur="4s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="opacity" from="1" to="0" dur="4s" repeatCount="indefinite" begin="1.5s" />
    </circle>
  </g>

  <!-- カクテルグラスの本体 -->
  <polygon points="100,120 300,120 210,220 210,290 250,290 250,300 150,300 150,290 190,290 190,220" fill="none" stroke="#ff79c6" stroke-width="5" stroke-linejoin="round" filter="url(#neon-glow)" />

  <!-- カクテルの飾り（レモン） -->
  <path d="M 90 110 A 20 20 0 0 1 110 130" fill="none" stroke="#f1fa8c" stroke-width="4" filter="url(#neon-glow)" />

  <!-- テキスト -->
  <text x="200" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#00ffff" text-anchor="middle" filter="url(#neon-glow)">imshota1009's Bar</text>
  <text x="200" y="320" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-style="italic" fill="#ffb86c" text-anchor="middle" opacity="0.9">Today's Drink: Martini</text>
  <text x="200" y="350" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="bold" fill="#ff79c6" text-anchor="middle">Total Stars: 128 / 200 (64.0%)</text>
  <text x="200" y="380" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#50fa7b" text-anchor="middle" filter="url(#neon-glow)">★ 128</text>
</svg>